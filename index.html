<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career | KyLin @ NTNU</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
body {
	/* 以 Noto Sans TC 為主要字體 */
	font-family: 'Noto Sans TC', 'Plus Jakarta Sans', sans-serif;
	background: #0f172a;
	color: #f8fafc;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
	align-items: center;
	padding: 40px 20px;
	overflow-x: hidden;
}
/* 動態背景光暈 */
.bg-glow {
	position: fixed;
	width: 600px;
	height: 600px;
	background: radial-gradient(circle, rgba(148, 163, 184, 0.05) 0%, rgba(30, 41, 59, 0) 70%);
	border-radius: 50%;
	filter: blur(100px);
	z-index: -1;
	animation: pulse 12s infinite alternate;
}
@keyframes pulse {
0% {
transform: translate(-5%, -5%) scale(1);
}
100% {
transform: translate(5%, 5%) scale(1.1);
}
}
/* 大標題樣式 */
.main-title {
	font-size: 3.5rem;
	font-weight: 800;
	margin-bottom: 50px;
	background: linear-gradient(to right, #f8fafc, #94a3b8);
	-webkit-background-clip: text;
	background-clip: text;
	-webkit-text-fill-color: transparent;
	letter-spacing: -0.02em;
}
.dashboard {
	background: rgba(30, 41, 59, 0.6);
	backdrop-filter: blur(24px) saturate(150%);
	border: 1px solid rgba(255, 255, 255, 0.08);
	border-radius: 32px;
	width: 100%;
	/* 調寬最大寬度 */
	max-width: 1024px;
	box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4);
}
.nav-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
	gap: 20px;
	padding: 32px;
}
.nav-card {
	background: rgba(255, 255, 255, 0.02);
	border: 1px solid rgba(255, 255, 255, 0.05);
	border-radius: 24px;
	padding: 24px;
	transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
	display: flex;
	flex-direction: column;
	gap: 16px;
}
.nav-card:hover {
	background: rgba(255, 255, 255, 0.04);
	transform: translateY(-4px);
}
.card-header {
	display: flex;
	align-items: center;
	gap: 12px;
}
.icon-box {
	width: 42px;
	height: 42px;
	border-radius: 12px;
	display: flex;
	align-items: center;
	justify-content: center;
	transition: all 0.3s;
	flex-shrink: 0;
}
/* 連結容器排版：2/3 與 1/3 */
.link-group {
	display: flex;
	gap: 8px;
	width: 100%;
}
.sub-link {
	padding: 10px 4px;
	border-radius: 12px;
	text-align: center;
	font-size: 0.85rem;
	font-weight: 500;
	transition: all 0.2s;
}
/* 主要連結 (2/3) */
.sub-link-primary {
	flex: 2;
	background: rgba(255, 255, 255, 0.08);
	border: 1px solid rgba(255, 255, 255, 0.1);
	color: white;
}
/* 次要連結 (1/3) */
.sub-link-secondary {
	flex: 1;
	background: rgba(255, 255, 255, 0.03);
	border: 1px solid rgba(255, 255, 255, 0.03);
	color: rgba(255, 255, 255, 0.4); /* Muted 效果 */
}
/* 禁用連結樣式 (保留位置但無法點擊且呈現灰暗) */
.sub-link-disabled {
	flex: 1;
	background: rgba(255, 255, 255, 0.01);
	border: 1px solid rgba(255, 255, 255, 0.02);
	color: rgba(255, 255, 255, 0.15); /* 極深灰色 */
	pointer-events: none;
	cursor: not-allowed;
	user-select: none;
}
/* --- 高中版配色 --- */
.hs-gradient-text {
	background: linear-gradient(135deg, #38bdf8, #a78bfa);
	-webkit-background-clip: text;
	background-clip: text;
	-webkit-text-fill-color: transparent;
	color: transparent;
	display: inline-block;
}
.hs-card:hover {
	border-color: rgba(167, 139, 250, 0.3);
}
.hs-card .icon-box {
	background: rgba(167, 139, 250, 0.1);
	color: #a78bfa;
}
.hs-card .sub-link-primary:hover {
	background: #a78bfa;
	color: white;
	border-color: #a78bfa;
}
.hs-card .sub-link-secondary:hover {
	background: rgba(255, 255, 255, 0.1);
	color: #a78bfa;
}
/* --- 國中版配色 --- */
.js-gradient-text {
	background: linear-gradient(135deg, #FDE68A, #FB923C);
	-webkit-background-clip: text;
	background-clip: text;
	-webkit-text-fill-color: transparent;
	color: transparent;
	display: inline-block;
}
.js-card:hover {
	border-color: rgba(251, 146, 60, 0.25);
}
.js-card .icon-box {
	background: rgba(253, 230, 138, 0.08);
	color: #fde68a;
}
.js-card .sub-link-primary:hover {
	background: #fb923c;
	color: white;
	border-color: #fb923c;
}
.js-card .sub-link-secondary:hover {
	background: rgba(255, 255, 255, 0.1);
	color: #fb923c;
}
.note-card {
	background: rgba(255, 255, 255, 0.02);
	border: 1px solid rgba(255, 255, 255, 0.1);
	border-radius: 14px;
	padding: 10px 20px;
	transition: all 0.3s;
	display: flex;
	align-items: center;
	gap: 10px;
}

@media (max-width: 640px) {
.main-title {
	font-size: 2.25rem;
	margin-bottom: 40px;
}
}
</style>
</head>
