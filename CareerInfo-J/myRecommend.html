<body>
<form>
  <!-- Spinner Start -->
  <div id="spinner" class="show">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">載入中...</span>
    </div>
  </div>
  <!-- Spinner End -->
  
  <header>
  </header>
  <main class="myRecommend">
    <!-- Content Start -->
    <div class="container-fluid">
      <div class="row justify-content-center">
        <!-- 左 開始 -->
        <div class="col-xl-3 col-xxxxl-2 py-5">
          <div class="user-data sticky-top">
            <div class="avater">鄭</div>
            <div class="user-data-name">小文</div>
            <ul class="user-data-list">
              <li>帳號<span>aaa123@gmail.com</span></li>
              <li>學校<span>閱讀高中</span></li>
              <li>班級<span>一年二班</span></li>
              <li>註冊時間<span>2024-01-01</span></li>
              <li>上次登入時間<span>2024-11-01</span></li>
            </ul>
            <div class="text-center mb-2">
              <button type="button" class="btn btn-primary rounded-pill px-4 btn-sm link-scale" data-bs-toggle="modal" data-bs-target="#modalEditUser">編輯個人資料</button>
            </div>
          </div>
          <!-- Modal#modalEditUser -->
          <div class="modal fade futuristic-modal" id="modalEditUser" tabindex="-1" aria-labelledby="modalEditUserLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">編輯個人資料</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <div class="mb-3">
                    <label for="inputName" class="form-label mb-1">姓名</label>
                    <input type="text" class="form-control" id="inputName" placeholder="請填寫真實中文姓名" value="宥之">
                  </div>
                  <div class="mb-3">
                    <label for="inputEmail" class="form-label mb-1">帳號</label>
                    <input type="email" class="form-control" id="inputEmail" placeholder="請輸入您的Email" value="aaa123@gmail.com" disabled>
                  </div>
                  <div class="mb-3">
                    <label for="inputPassword" class="form-label mb-1">密碼</label>
                    <div class="input-group ">
                      <input type="password" class="form-control" id="inputPassword" placeholder="請輸入6至15位英數字混和之密碼" aria-label="密碼" aria-describedby="passwordHelp">
                      <button class="btn btn-showHidePD" type="button" id="togglePassword" aria-label="顯示或隱藏密碼">
                      <i class="bi bi-eye-slash-fill"></i>
                      </button>
                    </div>
                    <div class="form-text text-info">如不修改請空白。</div>
                  </div>
                  <div class="mb-3">
                    <label for="inputCheckPassword" class="form-label mb-1">確認密碼</label>
                    <div class="input-group">
                      <input type="password" class="form-control" id="inputCheckPassword" placeholder="請再次輸入密碼" aria-label="確認密碼" aria-describedby="passwordCheckHelp">
                      <button class="btn btn-showHidePD" type="button" id="toggleCheckPassword" aria-label="顯示或隱藏確認密碼">
                      <i class="bi bi-eye-slash-fill"></i>
                      </button>
                    </div>
                    <div class="form-text text-info">如不修改請空白。</div>
                  </div>
                  <div class="mb-3">
                    <label for="inputsSchool" class="form-label mb-1">學校</label>
                    <input type="text" class="form-control" id="inputsSchool" placeholder="請填寫學校" value="閱讀高中">
                  </div>
                  <div class="mb-3">
                    <label for="inputClass" class="form-label mb-1">班級</label>
                    <input type="text" class="form-control" id="inputClass" placeholder="請填寫班級" value="一年二班">
                  </div>
                  <div class="mb-3 text-center">
                    <button type="button" class="btn btn-primary rounded-pill px-4 link-scale" id="" data-bs-dismiss="modal">修改</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- 左 結束 -->
        <!-- 右 開始 -->
        <div class="col-xl-9 col-xxxxl-8 py-5">
          <div class="row gy-5 px-xxxxl-5">
            <!-- 我的優勢能力 開始-->
            <div class="myRecommend-TA">
              <!-- 未測驗 -->
              <div class="row g-0 align-items-stretch data-empty">
                <div class="col">
                  <div class="card myRecommend-card">
                    <div class="card-body">
                      <h2 class="myRecommend-title">您尚未進行讚生涯性向測驗！ </h2>
                      <div class="text-center">
                        <a href="test.html" class="btn btn-outline-primary btn-sm rounded-pill px-4 m-1">認識讚生涯測驗</a>
                        <a href="#" class="btn btn-outline-primary btn-sm rounded-pill px-4 m-1" role="button" data-bs-toggle="modal" data-bs-target="#modal-testSchedule">如何安排測驗？</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- 已測驗 -->
              <div class="row g-0 align-items-stretch data-tested">
                <div class="col">
                  <div class="card myRecommend-card">
                    <div class="card-body">
                      <h2 class="myRecommend-title">我的優勢能力</h2>
                      <div class="row align-items-center justify-content-around">
                        <div class="col-md-5">
                          <div class="myRecommend-symbol">
                            <div class="myRecommend-symbol-item">
                              <div class="TA-symbol S">空間</div>
                            </div>
                            <div class="myRecommend-symbol-item">
                              <div class="TA-symbol C">創意</div>
                            </div>
                            <div class="myRecommend-symbol-item">
                              <div class="TA-symbol M">數學數學</div>
                            </div>
                          </div>
                        </div>
                        <div class="col-md-5">
                          <div class="myRecommend-group">
                            <h3 class="myRecommend-group-title">適合發展類群</h3>
                            <button class="btn myRecommend-group-btn">電機電子群</button>
                            <button class="btn myRecommend-group-btn">土木建築群</button>
                            <button class="btn myRecommend-group-btn">食品群</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- 我的優勢能力 結束-->
            <!-- 我的興趣類型 開始-->
            <div class="myRecommend-TI">
              <!-- 未測驗 -->
              <div class="row g-0 align-items-stretch data-empty">
                <div class="col">
                  <div class="card myRecommend-card">
                    <div class="card-body">
                      <h2 class="myRecommend-title">您尚未進行讚生涯興趣測驗！ </h2>
                      <div class="text-center">
                        <a href="test.html" class="btn btn-outline-primary btn-sm rounded-pill px-4 m-1">認識讚生涯測驗</a>
                        <a href="#" class="btn btn-outline-primary btn-sm rounded-pill px-4 m-1" role="button" data-bs-toggle="modal" data-bs-target="#modal-testSchedule">如何安排測驗？</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- 已測驗 -->
              <div class="row g-0 align-items-stretch data-tested">
                <div class="col">
                  <div class="card myRecommend-card">
                    <div class="card-body">
                      <h2 class="myRecommend-title">我的興趣類型</h2>
                      <div class="row align-items-center justify-content-around">
                        <div class="col-md-5">
                          <div class="myRecommend-symbol">
                            <div class="myRecommend-symbol-item">
                              <div class="TI-symbol A"><span class="label-code">A</span><span class="label-text">藝術型</span></div>
                            </div>
                            <div class="myRecommend-symbol-item">
                              <div class="TI-symbol E"><span class="label-code">E</span><span class="label-text">企業型</span></div>
                            </div>
                            <div class="myRecommend-symbol-item">
                              <div class="TI-symbol I"><span class="label-code">I</span><span class="label-text">研究型</span></div>
                            </div>
                          </div>
                        </div>
                        <div class="col-md-5">
                          <div class="myRecommend-group">
                            <h3 class="myRecommend-group-title">建議探索領域</h3>
                            <button class="btn myRecommend-group-btn">普通高中</button>
                            <button class="btn myRecommend-group-btn">藝術群</button>
                            <button class="btn myRecommend-group-btn">外語群</button>
                            <button class="btn myRecommend-group-btn">設計群</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- 我的興趣類型 結束-->
          </div>
        </div>
        <!-- 右 結束 -->
      </div>
    </div>
    <!-- Content End -->
  </main>

  </footer>

<script>
$(document).ready(function () {
	
	//nav當前頁active
	navActive('myRecommend');
	
	//個人資料 sticky-top
	$(window).scroll(function () { 
		var scrollTop = $(this).scrollTop();
		var footerOffset = $('footer').offset().top;
		var windowHeight = $(window).height();

		if (scrollTop > 300 && scrollTop + windowHeight < footerOffset) {
			$('.user-data.sticky-top').css('top', $('header').outerHeight() + 20);

		} else {
			$('.user-data.sticky-top').css('top', '20px');
		}
	});

	//適配、對應owl-carousel
	$('.owl-carousel').owlCarousel({
		autoplay: false,
		smartSpeed: 300,
		loop: false,
		nav: true,
		navText: ['<i class="bi bi-chevron-left"></i>', '<i class="bi bi-chevron-right"></i>'],
		dots: false,
		autoWidth: true,  
		responsiveClass: true,
		items: 1
	})	
});	
</script>
